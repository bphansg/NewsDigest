<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 2400" width="3840" height="2400" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="3840" height="2400" rx="48" fill="url(#bg)"/>

  <!-- Title -->
  <text x="1920" y="140" text-anchor="middle" fill="#f1f5f9" font-size="88" font-weight="700">NewsDigest Architecture</text>
  <text x="1920" y="230" text-anchor="middle" fill="#94a3b8" font-size="52">AI-powered news curation pipeline for macOS</text>

  <!-- ============================================ -->
  <!-- DATA SOURCES -->
  <!-- ============================================ -->
  <text x="200" y="360" fill="#64748b" font-size="44" font-weight="600">DATA SOURCES</text>

  <!-- Hacker News -->
  <g>
    <rect x="200" y="400" width="960" height="260" rx="40" fill="#78350f" opacity="0.5" stroke="#f59e0b" stroke-width="6"/>
    <text x="480" y="520" text-anchor="middle" fill="#fcd34d" font-size="56" font-weight="700">Hacker News</text>
    <text x="480" y="600" text-anchor="middle" fill="#fbbf24" font-size="40">Firebase REST API · Top 60 stories</text>
    <rect x="780" y="460" width="300" height="80" rx="40" fill="#92400e" opacity="0.5"/>
    <text x="930" y="512" text-anchor="middle" fill="#fde68a" font-size="36" font-weight="600">TaskGroup(10)</text>
  </g>

  <!-- RSS Feeds -->
  <g>
    <rect x="1220" y="400" width="960" height="260" rx="40" fill="#7f1d1d" opacity="0.5" stroke="#ef4444" stroke-width="6"/>
    <text x="1500" y="520" text-anchor="middle" fill="#fca5a5" font-size="56" font-weight="700">RSS Feeds</text>
    <text x="1500" y="600" text-anchor="middle" fill="#f87171" font-size="40">TechCrunch · Ars Technica · Verge · MIT · Wired</text>
    <rect x="1800" y="460" width="300" height="80" rx="40" fill="#991b1b" opacity="0.5"/>
    <text x="1950" y="512" text-anchor="middle" fill="#fca5a5" font-size="36" font-weight="600">XML Parser</text>
  </g>

  <!-- Newsletters -->
  <g>
    <rect x="2240" y="400" width="1400" height="260" rx="40" fill="#4c1d95" opacity="0.5" stroke="#8b5cf6" stroke-width="6"/>
    <text x="2640" y="520" text-anchor="middle" fill="#c4b5fd" font-size="56" font-weight="700">Newsletters / Substack</text>
    <text x="2640" y="600" text-anchor="middle" fill="#a78bfa" font-size="40">Stratechery · Simon Willison · Lenny's · Pragmatic Engineer</text>
    <rect x="3260" y="460" width="300" height="80" rx="40" fill="#5b21b6" opacity="0.5"/>
    <text x="3410" y="512" text-anchor="middle" fill="#c4b5fd" font-size="36" font-weight="600">Atom + RSS</text>
  </g>

  <!-- Arrows down -->
  <line x1="680" y1="660" x2="680" y2="800" stroke="#94a3b8" stroke-width="6" marker-end="url(#arr)"/>
  <line x1="1700" y1="660" x2="1700" y2="800" stroke="#94a3b8" stroke-width="6" marker-end="url(#arr)"/>
  <line x1="2940" y1="660" x2="2940" y2="800" stroke="#94a3b8" stroke-width="6" marker-end="url(#arr)"/>

  <!-- ============================================ -->
  <!-- SERVICES LAYER -->
  <!-- ============================================ -->
  <text x="200" y="790" fill="#64748b" font-size="44" font-weight="600">SERVICES</text>

  <g>
    <rect x="200" y="830" width="3440" height="340" rx="48" fill="#1e3a5f" opacity="0.35" stroke="#3b82f6" stroke-width="6"/>
    <text x="600" y="950" fill="#93c5fd" font-size="52" font-weight="700">Processing Pipeline</text>

    <!-- Service sub-modules -->
    <rect x="300" y="1000" width="480" height="120" rx="24" fill="#1e40af" opacity="0.4"/>
    <text x="540" y="1075" text-anchor="middle" fill="#93c5fd" font-size="40" font-weight="600">HackerNewsService</text>

    <rect x="820" y="1000" width="420" height="120" rx="24" fill="#1e40af" opacity="0.4"/>
    <text x="1030" y="1075" text-anchor="middle" fill="#93c5fd" font-size="40" font-weight="600">RSSService</text>

    <rect x="1280" y="1000" width="420" height="120" rx="24" fill="#1e40af" opacity="0.4"/>
    <text x="1490" y="1075" text-anchor="middle" fill="#93c5fd" font-size="40" font-weight="600">TopicMatcher</text>

    <rect x="1740" y="1000" width="460" height="120" rx="24" fill="#1e40af" opacity="0.4"/>
    <text x="1970" y="1075" text-anchor="middle" fill="#93c5fd" font-size="40" font-weight="600">DigestGenerator</text>

    <rect x="2240" y="1000" width="460" height="120" rx="24" fill="#1e40af" opacity="0.4"/>
    <text x="2470" y="1075" text-anchor="middle" fill="#93c5fd" font-size="40" font-weight="600">SchedulerService</text>

    <rect x="2740" y="1000" width="420" height="120" rx="24" fill="#1e40af" opacity="0.4"/>
    <text x="2950" y="1075" text-anchor="middle" fill="#93c5fd" font-size="40" font-weight="600">SpeechService</text>
  </g>

  <!-- Scheduler arc -->
  <path d="M 2470 830 Q 2470 760, 1700 760 Q 540 760, 540 830" stroke="#10b981" stroke-width="6" fill="none" stroke-dasharray="20,12" marker-end="url(#arrGreen)"/>
  <text x="1500" y="745" text-anchor="middle" fill="#6ee7b7" font-size="36">auto-fetch trigger</text>

  <!-- Arrow down to ViewModel -->
  <line x1="1920" y1="1170" x2="1920" y2="1340" stroke="#94a3b8" stroke-width="6" marker-end="url(#arr)"/>

  <!-- ============================================ -->
  <!-- STATE MANAGEMENT -->
  <!-- ============================================ -->
  <text x="200" y="1340" fill="#64748b" font-size="44" font-weight="600">STATE MANAGEMENT</text>

  <!-- ViewModel -->
  <g>
    <rect x="400" y="1380" width="1800" height="280" rx="48" fill="#7f1d1d" opacity="0.4" stroke="#ef4444" stroke-width="6"/>
    <text x="700" y="1500" fill="#fca5a5" font-size="60" font-weight="700">NewsViewModel</text>
    <text x="700" y="1580" fill="#f87171" font-size="40">@MainActor · ObservableObject · @Published state</text>

    <rect x="1600" y="1430" width="260" height="80" rx="40" fill="#991b1b" opacity="0.4"/>
    <text x="1730" y="1482" text-anchor="middle" fill="#fca5a5" font-size="32" font-weight="600">Set&lt;URL&gt;</text>

    <rect x="1880" y="1430" width="260" height="80" rx="40" fill="#991b1b" opacity="0.4"/>
    <text x="2010" y="1482" text-anchor="middle" fill="#fca5a5" font-size="32" font-weight="600">rank cache</text>
  </g>

  <!-- SwiftData -->
  <g>
    <rect x="2400" y="1380" width="1240" height="280" rx="48" fill="#78350f" opacity="0.4" stroke="#f59e0b" stroke-width="6"/>
    <text x="2700" y="1500" fill="#fcd34d" font-size="60" font-weight="700">SwiftData</text>
    <text x="2700" y="1580" fill="#fbbf24" font-size="40">ModelContainer · Persistent SQLite</text>

    <rect x="3100" y="1430" width="200" height="80" rx="40" fill="#92400e" opacity="0.5"/>
    <text x="3200" y="1482" text-anchor="middle" fill="#fde68a" font-size="32" font-weight="600">Article</text>

    <rect x="3320" y="1430" width="160" height="80" rx="40" fill="#92400e" opacity="0.5"/>
    <text x="3400" y="1482" text-anchor="middle" fill="#fde68a" font-size="32" font-weight="600">Topic</text>

    <rect x="3500" y="1430" width="160" height="80" rx="40" fill="#92400e" opacity="0.5"/>
    <text x="3580" y="1482" text-anchor="middle" fill="#fde68a" font-size="32" font-weight="600">Digest</text>
  </g>

  <!-- ViewModel <-> SwiftData -->
  <line x1="2200" y1="1520" x2="2390" y2="1520" stroke="#ef4444" stroke-width="6" marker-end="url(#arrRed)"/>
  <text x="2300" y="1500" text-anchor="middle" fill="#f87171" font-size="32">read/write</text>

  <!-- Arrow down to Views -->
  <line x1="800" y1="1660" x2="600" y2="1820" stroke="#ef4444" stroke-width="6" stroke-dasharray="20,12" marker-end="url(#arrRed)"/>
  <line x1="1100" y1="1660" x2="1380" y2="1820" stroke="#ef4444" stroke-width="6" stroke-dasharray="20,12" marker-end="url(#arrRed)"/>
  <line x1="1500" y1="1660" x2="2100" y2="1820" stroke="#ef4444" stroke-width="6" stroke-dasharray="20,12" marker-end="url(#arrRed)"/>
  <line x1="1800" y1="1660" x2="2840" y2="1820" stroke="#ef4444" stroke-width="6" stroke-dasharray="20,12" marker-end="url(#arrRed)"/>
  <text x="1200" y="1760" fill="#f87171" font-size="32">@EnvironmentObject reactive binding</text>

  <!-- ============================================ -->
  <!-- PRESENTATION LAYER -->
  <!-- ============================================ -->
  <text x="200" y="1820" fill="#64748b" font-size="44" font-weight="600">PRESENTATION — SwiftUI</text>

  <!-- Feed -->
  <g>
    <rect x="200" y="1860" width="800" height="300" rx="40" fill="#7f1d1d" opacity="0.4" stroke="#ef4444" stroke-width="6"/>
    <text x="600" y="1970" text-anchor="middle" fill="#fca5a5" font-size="52" font-weight="700">Feed</text>
    <text x="600" y="2030" text-anchor="middle" fill="#f87171" font-size="36">Magazine layout</text>
    <text x="600" y="2090" text-anchor="middle" fill="#f87171" font-size="36">Cover · Editorial · Wide cards</text>
    <text x="600" y="2130" text-anchor="middle" fill="#f87171" font-size="32">Search · Filter · LazyVGrid</text>
  </g>

  <!-- Topics -->
  <g>
    <rect x="1060" y="1860" width="680" height="300" rx="40" fill="#4c1d95" opacity="0.4" stroke="#8b5cf6" stroke-width="6"/>
    <text x="1400" y="1970" text-anchor="middle" fill="#c4b5fd" font-size="52" font-weight="700">Topics</text>
    <text x="1400" y="2030" text-anchor="middle" fill="#a78bfa" font-size="36">3-column tile grid</text>
    <text x="1400" y="2090" text-anchor="middle" fill="#a78bfa" font-size="36">FlowLayout keywords</text>
    <text x="1400" y="2130" text-anchor="middle" fill="#a78bfa" font-size="32">CRUD · Enable/Disable</text>
  </g>

  <!-- Digests -->
  <g>
    <rect x="1800" y="1860" width="680" height="300" rx="40" fill="#1e3a5f" opacity="0.5" stroke="#3b82f6" stroke-width="6"/>
    <text x="2140" y="1970" text-anchor="middle" fill="#93c5fd" font-size="52" font-weight="700">Digests</text>
    <text x="2140" y="2030" text-anchor="middle" fill="#60a5fa" font-size="36">Podcast-style audio</text>
    <text x="2140" y="2090" text-anchor="middle" fill="#60a5fa" font-size="36">NotebookLM narration</text>
    <text x="2140" y="2130" text-anchor="middle" fill="#60a5fa" font-size="32">Play · Pause · Progress</text>
  </g>

  <!-- Settings + Reader -->
  <g>
    <rect x="2540" y="1860" width="600" height="300" rx="40" fill="#064e3b" opacity="0.4" stroke="#10b981" stroke-width="6"/>
    <text x="2840" y="1970" text-anchor="middle" fill="#6ee7b7" font-size="52" font-weight="700">Settings</text>
    <text x="2840" y="2030" text-anchor="middle" fill="#34d399" font-size="36">Schedule · Storage</text>
    <text x="2840" y="2090" text-anchor="middle" fill="#34d399" font-size="36">MenuBar · Background</text>
    <text x="2840" y="2130" text-anchor="middle" fill="#34d399" font-size="32">Sources config</text>
  </g>

  <g>
    <rect x="3200" y="1860" width="440" height="300" rx="40" fill="#134e4a" opacity="0.5" stroke="#14b8a6" stroke-width="6"/>
    <text x="3420" y="1970" text-anchor="middle" fill="#5eead4" font-size="52" font-weight="700">Reader</text>
    <text x="3420" y="2030" text-anchor="middle" fill="#2dd4bf" font-size="36">WKWebView</text>
    <text x="3420" y="2090" text-anchor="middle" fill="#2dd4bf" font-size="36">JS text extract</text>
    <text x="3420" y="2130" text-anchor="middle" fill="#2dd4bf" font-size="32">Listen · TTS</text>
  </g>

  <!-- ============================================ -->
  <!-- APP ENTRY -->
  <!-- ============================================ -->
  <line x1="1920" y1="2160" x2="1920" y2="2240" stroke="#64748b" stroke-width="6" stroke-dasharray="16,12"/>
  <polygon points="1900,2220 1920,2270 1940,2220" fill="#64748b"/>

  <g>
    <rect x="600" y="2260" width="2640" height="120" rx="40" fill="#312e81" opacity="0.4" stroke="#6366f1" stroke-width="6"/>
    <text x="1920" y="2335" text-anchor="middle" fill="#c4b5fd" font-size="48" font-weight="700">NewsDigestApp.swift</text>
    <text x="2720" y="2335" fill="#818cf8" font-size="36">WindowGroup · MenuBarExtra · AppDelegate · ModelContainer</text>
  </g>

  <!-- Footer -->
  <text x="1920" y="2390" text-anchor="middle" fill="#475569" font-size="32">Zero dependencies · SwiftUI · SwiftData · AVFoundation · WebKit · Designed by Binh Phan</text>
</svg>
